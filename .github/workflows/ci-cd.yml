name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push rate-limiter
        uses: docker/build-push-action@v5
        with:
          context: ./rate-limiter
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rate-limiter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push node-backend
        uses: docker/build-push-action@v5
        with:
          context: ./node-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/node-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-and-test:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        id: tf-apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_docker_user: ${{ secrets.DOCKER_USERNAME }}

      - name: Get ALB DNS
        id: alb-info
        working-directory: ./terraform
        run: echo "dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster rate-limiter-cluster \
            --service rate-limiter \
            --force-new-deployment

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster rate-limiter-cluster \
            --services rate-limiter

      - name: Wait for services
        env:
          ALB_DNS: ${{ steps.alb-info.outputs.dns }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf -X POST "http://${ALB_DNS}/api/keys" > /dev/null 2>&1; then
              echo "Services ready"
              exit 0
            fi
            echo "Waiting for services... attempt $i"
            sleep 5
          done
          echo "Services not ready after 30 attempts"
          exit 1

      - name: Post-deploy k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/smoke-test.js
          flags: -e BASE_URL=http://${{ steps.alb-info.outputs.dns }}

      - name: Post-deploy k6 rate-limit test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/rate-limit-test.js
          flags: -e BASE_URL=http://${{ steps.alb-info.outputs.dns }}

      - name: Post-deploy k6 spike test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/spike-test.js
          flags: -e BASE_URL=http://${{ steps.alb-info.outputs.dns }}

      - name: Terraform Destroy
        if: always()
        working-directory: ./terraform
        run: terraform destroy -auto-approve
        env:
          TF_VAR_docker_user: ${{ secrets.DOCKER_USERNAME }}
