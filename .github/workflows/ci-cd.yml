name: CI/CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push rate-limiter
        uses: docker/build-push-action@v5
        with:
          context: ./rate-limiter
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/rate-limiter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push node-backend
        uses: docker/build-push-action@v5
        with:
          context: ./node-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/node-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-and-test:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        id: tf-apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_ghcr_user: ${{ github.actor }}

      - name: Get EC2 info
        id: ec2-info
        working-directory: ./terraform
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for SSM agent
        env:
          INSTANCE_ID: ${{ steps.ec2-info.outputs.instance_id }}
        run: |
          for i in $(seq 1 36); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "Unknown")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent online"
              exit 0
            fi
            echo "Waiting for SSM agent... attempt $i"
            sleep 10
          done
          echo "SSM agent not online after 6 minutes"
          exit 1

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.ec2-info.outputs.instance_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.actor }}
        run: |
          COMMANDS_JSON=$(jq -n \
            --arg c1 'for i in $(seq 1 12); do if docker info >/dev/null 2>&1; then break; fi; echo "Waiting for Docker..."; sleep 10; done' \
            --arg c2 'docker info >/dev/null 2>&1 || { echo "Docker not ready"; exit 1; }' \
            --arg c3 "echo $GH_TOKEN | docker login ghcr.io -u $GH_USER --password-stdin" \
            --arg c4 'cd /opt/rate-limiter && docker compose pull && docker compose up -d' \
            '{commands: [$c1, $c2, $c3, $c4]}')
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS_JSON" \
            --wait-for-success

      - name: Wait for services
        env:
          EC2_IP: ${{ steps.ec2-info.outputs.public_ip }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf -X POST "http://${EC2_IP}/api/keys" > /dev/null 2>&1; then
              echo "Services ready"
              exit 0
            fi
            echo "Waiting for services... attempt $i"
            sleep 5
          done
          echo "Services not ready after 30 attempts"
          exit 1

      - name: Post-deploy k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/smoke-test.js
          flags: -e BASE_URL=http://${{ steps.ec2-info.outputs.public_ip }}

      - name: Post-deploy k6 rate-limit test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/rate-limit-test.js
          flags: -e BASE_URL=http://${{ steps.ec2-info.outputs.public_ip }}

      - name: Post-deploy k6 spike test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6-tests/spike-test.js
          flags: -e BASE_URL=http://${{ steps.ec2-info.outputs.public_ip }}

      - name: Terraform Destroy
        if: always()
        working-directory: ./terraform
        run: terraform destroy -auto-approve
        env:
          TF_VAR_ghcr_user: ${{ github.actor }}
